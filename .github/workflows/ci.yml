name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PHP_INI_VALUES: >-
    memory_limit=-1,
    assert.exception=1,
    zend.assertions=1,
    error_reporting=-1,
    log_errors_max_len=0,
    display_errors=On

jobs:
  # -------------------------------------------------------------------------
  # Job 1 – Validate composer.json
  # -------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          ini-values: ${{ env.PHP_INI_VALUES }}
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

  # -------------------------------------------------------------------------
  # Job 2 – Coding Standards (PHP CS Fixer, dry-run)
  # -------------------------------------------------------------------------
  coding-standards:
    name: Coding Standards
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          ini-values: ${{ env.PHP_INI_VALUES }}
          coverage: none
          tools: cs2pr

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.0-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-8.0-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Check coding standards
        run: ./vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle | cs2pr

  # -------------------------------------------------------------------------
  # Job 3 – Static Analysis (PHPStan level 9)
  # -------------------------------------------------------------------------
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          ini-values: ${{ env.PHP_INI_VALUES }}
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.0-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-8.0-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Cache PHPStan results
        uses: actions/cache@v4
        with:
          path: /tmp/phpstan-cache
          key: ${{ runner.os }}-phpstan-${{ hashFiles('src/**/*.php', 'tests/**/*.php', 'phpstan.dist.neon') }}
          restore-keys: ${{ runner.os }}-phpstan-

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --error-format=github --no-progress

  # -------------------------------------------------------------------------
  # Job 4 – Test Suite (matrix: PHP 8.0 → 8.4)
  # -------------------------------------------------------------------------
  tests:
    name: Tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-version:
          - '8.0'
          - '8.1'
          - '8.2'
          - '8.3'
          - '8.4'
          - '8.5'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          ini-values: ${{ env.PHP_INI_VALUES }}
          # PCOV is lighter than Xdebug and sufficient for line coverage
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-${{ matrix.php-version }}-composer-

      - name: Install dependencies
        # --ignore-platform-req=php+ lets Composer use packages resolved for the
        # pinned platform (PHP 8.0) while actually running under any 8.x version.
        run: composer install --prefer-dist --no-interaction --no-progress --ignore-platform-req=php+

      - name: Create build directories
        run: mkdir -p build/coverage

      - name: Run test suite
        run: >-
          ./vendor/bin/phpunit
          --coverage-xml=build/coverage/coverage-xml
          --log-junit=build/coverage/junit.xml
          --coverage-clover=build/coverage/clover.xml

      # Upload coverage artefact only once (PHP 8.3) to feed mutation testing
      - name: Upload coverage artefact
        uses: actions/upload-artifact@v4
        if: matrix.php-version == '8.3'
        with:
          name: coverage-reports
          path: build/coverage/
          retention-days: 1

  # -------------------------------------------------------------------------
  # Job 5 – Mutation Testing (Infection, minMsi 85 %)
  # Runs only after the full test matrix succeeds.
  # -------------------------------------------------------------------------
  mutation-testing:
    name: Mutation Testing
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          ini-values: ${{ env.PHP_INI_VALUES }}
          coverage: pcov

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.0-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php-8.0-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Download coverage artefact
        uses: actions/download-artifact@v4
        with:
          name: coverage-reports
          path: build/coverage/

      - name: Run mutation tests
        run: >-
          ./vendor/bin/infection
          --coverage=build/coverage
          --logger-github
          --no-progress
