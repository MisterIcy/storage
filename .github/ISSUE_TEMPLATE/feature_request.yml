name: Feature Request
description: Propose a new feature or enhancement.
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please provide as much context as
        possible so the proposal can be evaluated fairly.

        > **Proposing a new adapter?** The adapter process is
        > RFC → ADR → PR. Read the full process in
        > [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md#proposing-and-shipping-a-new-adapter)
        > before filling in this form.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: >
        What problem does this feature solve? Describe the use case you are
        trying to address.
      placeholder: "As a developer using mistericy/storage, I need… because…"
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: >
        Describe the solution you would like to see. Include a rough API sketch
        if you have one.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: >
        Describe any alternative solutions or workarounds you have considered
        and why they fell short.
    validations:
      required: false

  - type: checkboxes
    id: adapter-proposal
    attributes:
      label: Is this a new adapter proposal?
      description: New adapters follow the RFC → ADR → PR process in CONTRIBUTING.md.
      options:
        - label: "Yes — I have read the adapter proposal process in CONTRIBUTING.md"

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: >
        Any other context, code samples, or references that support this
        request.
    validations:
      required: false
