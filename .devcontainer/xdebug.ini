[xdebug]
; Enable XDebug step debugger
xdebug.mode = debug,coverage

; Automatically start a debugging session on every request/script run
xdebug.start_with_request = yes

; VS Code debug adapter listens on localhost inside the container
xdebug.client_host = localhost
xdebug.client_port = 9003

; IDE key used by VS Code PHP Debug extension
xdebug.idekey = VSCODE

; Log file for troubleshooting connection issues
xdebug.log = /tmp/xdebug.log
